name: Build 3DS Homebrew
"on":
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest

    env:
      DEVKITPRO: /opt/devkitpro
      DEVKITARM: /opt/devkitpro/devkitARM
      PATH: /opt/devkitpro/tools/bin:/opt/devkitpro/devkitARM/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends cmake wget unzip git ca-certificates

      - name: Install 3DS Build Tools (makerom and bannertool)
        run: |
          # Download and install makerom v0.19.0 safely
          wget -q -O /tmp/makerom.zip github.com
          unzip -q /tmp/makerom.zip -d /tmp/makerom_out
          mv /tmp/makerom_out/makerom /opt/devkitpro/tools/bin/makerom
          chmod +x /opt/devkitpro/tools/bin/makerom

          # Download and install bannertool v1.2.2 safely
          wget -q -O /tmp/bannertool.zip github.com
          unzip -q /tmp/bannertool.zip -d /tmp/bannertool_out
          mv /tmp/bannertool_out/linux-x86_64/bannertool /opt/devkitpro/tools/bin/bannertool
          chmod +x /opt/devkitpro/tools/bin/bannertool

      - name: Build and install citro3d
        run: |
          git clone --depth 1 github.com /tmp/citro3d
          make -C /tmp/citro3d install

      - name: Build and install citro2d
        run: |
          git clone --depth 1 github.com /tmp/citro2d
          cd /tmp/citro2d
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=$DEVKITPRO/cmake/3DS.cmake \
            -DCMAKE_INSTALL_PREFIX=$DEVKITPRO \
            -DCTR_ROOT=$DEVKITPRO
          cmake --build build
          cmake --install build

      - name: Download audio decoders
        run: |
          mkdir -p source vendor
          curl -fsSL -o source/dr_mp3.h  githubusercontent.com
          curl -fsSL -o source/dr_flac.h githubusercontent.com
          curl -fsSL -o source/dr_wav.h  githubusercontent.com
          curl -fsSL -o vendor/stb_vorbis.c githubusercontent.com

      - name: Create icon and directories
        run: |
          mkdir -p romfs build
          python3 make_icon.py

      - name: Build
        run: make

      - name: Upload 3dsx Artifact
        uses: actions/upload-artifact@v4
        with:
          name: audioplayer-3dsx
          path: audioplayer.3dsx
          if-no-files-found: error

      - name: Upload CIA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: audioplayer-cia
          path: audioplayer.cia
          if-no-files-found: error
