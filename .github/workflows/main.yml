name: Build 3DS Homebrew

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest

    env:
      DEVKITPRO: /opt/devkitpro
      DEVKITARM: /opt/devkitpro/devkitARM
      PATH: /opt/devkitpro/tools/bin:/opt/devkitpro/devkitARM/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

    steps:
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Build dependencies — same as before
      # -----------------------------------------------------------------------
      - name: Install build tools (cmake, unzip, python3)
        run: apt-get update -qq && apt-get install -y --no-install-recommends cmake unzip python3

      - name: Build and install citro3d
        run: |
          git clone --depth 1 https://github.com/devkitPro/citro3d.git /tmp/citro3d
          make -C /tmp/citro3d install

      - name: Build and install citro2d
        run: |
          git clone --depth 1 https://github.com/devkitPro/citro2d.git /tmp/citro2d
          cd /tmp/citro2d
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=$DEVKITPRO/cmake/3DS.cmake \
            -DCMAKE_INSTALL_PREFIX=$DEVKITPRO \
            -DCTR_ROOT=$DEVKITPRO
          cmake --build build
          cmake --install build

      - name: Download single-header audio decoders
        run: |
          mkdir -p source vendor
          curl -fsSL -o source/dr_mp3.h  https://raw.githubusercontent.com/mackron/dr_libs/master/dr_mp3.h
          curl -fsSL -o source/dr_flac.h https://raw.githubusercontent.com/mackron/dr_libs/master/dr_flac.h
          curl -fsSL -o source/dr_wav.h  https://raw.githubusercontent.com/mackron/dr_libs/master/dr_wav.h
          curl -fsSL -o vendor/stb_vorbis.c https://raw.githubusercontent.com/nothings/stb/master/stb_vorbis.c

      - name: Create icon and romfs directory
        run: |
          mkdir -p romfs build
          python3 make_icon.py

      # -----------------------------------------------------------------------
      # Download makerom + bannertool — pinned to known-good releases
      # -----------------------------------------------------------------------
      - name: Download makerom v0.18.3
        run: |
          curl -fsSL -o /tmp/makerom.zip \
            https://github.com/3DSGuy/Project_CTR/releases/download/makerom-v0.18.3/makerom-v0.18.3-ubuntu_x86_64.zip
          unzip -o /tmp/makerom.zip makerom -d /usr/local/bin
          chmod +x /usr/local/bin/makerom
          makerom --version

      - name: Download bannertool 1.2.0
        run: |
          curl -fsSL -o /tmp/bannertool.zip \
            https://github.com/Steveice10/bannertool/releases/download/1.2.0/bannertool.zip
          mkdir -p /tmp/bannertool_unzip
          unzip -o /tmp/bannertool.zip -d /tmp/bannertool_unzip
          cp /tmp/bannertool_unzip/linux_x86_64/bannertool /usr/local/bin/bannertool
          chmod +x /usr/local/bin/bannertool
          bannertool 2>&1 | head -1 || true   # bannertool exits non-zero with no args; that's fine

      # -----------------------------------------------------------------------
      # Generate banner assets (256x128 PNG + silent WAV)
      # The Makefile's `make banner` target uses tools/gen_banner.py.
      # We run it here explicitly so the paths are predictable.
      # -----------------------------------------------------------------------
      - name: Generate banner assets
        run: make banner

      # -----------------------------------------------------------------------
      # Build .3dsx
      # -----------------------------------------------------------------------
      - name: Build .3dsx
        run: make

      # -----------------------------------------------------------------------
      # Build .cia (extended memory, installable title)
      # Calls bannertool + makerom directly via the Makefile's `cia` target.
      # -----------------------------------------------------------------------
      - name: Build .cia
        run: make cia

      # -----------------------------------------------------------------------
      # Upload both artifacts
      # -----------------------------------------------------------------------
      - name: Upload .3dsx
        uses: actions/upload-artifact@v4
        with:
          name: audioplayer-3dsx
          path: audioplayer.3dsx
          if-no-files-found: error

      - name: Upload .cia
        uses: actions/upload-artifact@v4
        with:
          name: audioplayer-cia
          path: audioplayer.cia
          if-no-files-found: error
