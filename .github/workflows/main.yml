name: Build 3DS Homebrew
"on":
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest

    env:
      DEVKITPRO: /opt/devkitpro
      DEVKITARM: /opt/devkitpro/devkitARM
      PATH: /opt/devkitpro/tools/bin:/opt/devkitpro/devkitARM/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends cmake wget unzip git ca-certificates build-essential libgmp-dev

      - name: Compile and Install makerom from source
        run: |
          git clone --recursive --depth 1 https://github.com/3DSGuy/Project_CTR/makerom
          make -C /tmp/project_ctr/makerom
          mv /tmp/project_ctr/makerom/makerom /opt/devkitpro/tools/bin/makerom
          chmod +x /opt/devkitpro/tools/bin/makerom

      - name: Compile and Install bannertool from source
        run: |
          git clone --recursive --depth 1 https://github.com/Epicpkmn11/bannertool
          cmake -B /tmp/bannertool_src/build -S /tmp/bannertool_src
          cmake --build /tmp/bannertool_src/build
          mv /tmp/bannertool_src/build/bannertool /opt/devkitpro/tools/bin/bannertool
          chmod +x /opt/devkitpro/tools/bin/bannertool

      - name: Verify tools are working and in PATH
        run: |
          echo "=== Verifying makerom version ==="
          makerom -v || true
          echo "=== Verifying bannertool environment ==="
          bannertool --help | head -n 1 || true

      - name: Build and install citro3d
        run: |
          git clone --depth 1 https://github.com/devkitPro/citro3d.git
          /tmp/citro3d
          make -C /tmp/citro3d install

      - name: Build and install citro2d
        run: |
          git clone --depth 1 https://github.com/devkitPro/citro2d.git
          /tmp/citro2d
          cd /tmp/citro2d
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=$DEVKITPRO/cmake/3DS.cmake \
            -DCMAKE_INSTALL_PREFIX=$DEVKITPRO \
            -DCTR_ROOT=$DEVKITPRO
          cmake --build build
          cmake --install build

      - name: Download audio decoders
        run: |
          mkdir -p source vendor
          curl -fsSL -o source/dr_mp3.h  githubusercontent.com
          curl -fsSL -o source/dr_flac.h githubusercontent.com
          curl -fsSL -o source/dr_wav.h  githubusercontent.com
          curl -fsSL -o vendor/stb_vorbis.c githubusercontent.com

      - name: Create icon and directories
        run: |
          mkdir -p romfs build
          python3 make_icon.py

      - name: Build
        run: make

      - name: Upload 3dsx Artifact
        uses: actions/upload-artifact@v4
        with:
          name: audioplayer-3dsx
          path: audioplayer.3dsx
          if-no-files-found: error

      - name: Upload CIA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: audioplayer-cia
          path: audioplayer.cia
          if-no-files-found: error
