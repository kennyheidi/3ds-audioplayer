name: Build 3DS Homebrew
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest

    env:
      DEVKITPRO: /opt/devkitpro
      DEVKITARM: /opt/devkitpro/devkitARM
      PATH: /opt/devkitpro/tools/bin:/opt/devkitpro/devkitARM/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            cmake wget unzip git ca-certificates build-essential libgmp-dev python3

      # ---------------------------------------------------------
      # Install portlibs (required for makerom)
      # ---------------------------------------------------------
      - name: Install 3DS portlibs
        run: |
          dkp-pacman -Sy --noconfirm 3ds-portlibs

      # ---------------------------------------------------------
      # makerom (correct repo + correct build)
      # ---------------------------------------------------------
      - name: Compile and Install makerom
        run: |
          git clone --recursive --depth 1 https://github.com/profi200/Project_CTR /tmp/project_ctr
          make -C /tmp/project_ctr/makerom
          mv /tmp/project_ctr/makerom/makerom /opt/devkitpro/tools/bin/makerom
          chmod +x /opt/devkitpro/tools/bin/makerom

      # ---------------------------------------------------------
      # bannertool (correct paths)
      # ---------------------------------------------------------
      - name: Compile and Install bannertool
        run: |
          git clone --recursive --depth 1 https://github.com/Epicpkmn11/bannertool /tmp/bannertool_src
          cmake -B /tmp/bannertool_src/build -S /tmp/bannertool_src
          cmake --build /tmp/bannertool_src/build
          mv /tmp/bannertool_src/build/bannertool /opt/devkitpro/tools/bin/bannertool
          chmod +x /opt/devkitpro/tools/bin/bannertool

      - name: Verify tools
        run: |
          makerom -v || true
          bannertool --help | head -n 1 || true

      # ---------------------------------------------------------
      # citro3d
      # ---------------------------------------------------------
      - name: Build and install citro3d
        run: |
          git clone --depth 1 https://github.com/devkitPro/citro3d.git /tmp/citro3d
          make -C /tmp/citro3d install

      # ---------------------------------------------------------
      # citro2d
      # ---------------------------------------------------------
      - name: Build and install citro2d
        run: |
          git clone --depth 1 https://github.com/devkitPro/citro2d.git /tmp/citro2d
          cd /tmp/citro2d
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=$DEVKITPRO/cmake/3DS.cmake \
            -DCMAKE_INSTALL_PREFIX=$DEVKITPRO \
            -DCTR_ROOT=$DEVKITPRO
          cmake --build build
          cmake --install build

      # ---------------------------------------------------------
      # Audio decoders (correct URLs)
      # ---------------------------------------------------------
      - name: Download audio decoders
        run: |
          mkdir -p source vendor
          curl -fsSL -o source/dr_mp3.h  https://raw.githubusercontent.com/mackron/dr_libs/master/dr_mp3.h
          curl -fsSL -o source/dr_flac.h https://raw.githubusercontent.com/mackron/dr_libs/master/dr_flac.h
          curl -fsSL -o source/dr_wav.h  https://raw.githubusercontent.com/mackron/dr_libs/master/dr_wav.h
          curl -fsSL -o vendor/stb_vorbis.c https://raw.githubusercontent.com/nothings/stb/master/stb_vorbis.c

      - name: Create icon and directories
        run: |
          mkdir -p romfs build
          python3 make_icon.py

      - name: Build
        run: make

      - name: Upload 3dsx Artifact
        uses: actions/upload-artifact@v4
        with:
          name: audioplayer-3dsx
          path: audioplayer.3dsx
          if-no-files-found: error

      - name: Upload CIA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: audioplayer-cia
          path: audioplayer.cia
          if-no-files-found: error
